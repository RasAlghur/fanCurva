version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fancurva_postgres
    environment:
      POSTGRES_USER: fancurva
      POSTGRES_PASSWORD: fancurva_secret
      POSTGRES_DB: fancurva_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fancurva_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
